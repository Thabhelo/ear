name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-main
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

env:
  GCP_PROJECT_ID: ear-thabhelo
  GCP_REGION: us-central1

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # The API now runs inside the Next.js app (route handlers), so the web
      # service carries the former API secrets.
      - name: Deploy Web
        run: |
          gcloud run deploy callsomeone-web \
            --project="${GCP_PROJECT_ID}" \
            --region="${GCP_REGION}" \
            --source=apps/web \
            --allow-unauthenticated \
            --quiet \
            --env-vars-file=apps/web/.cloudrun.env.yaml \
            --build-env-vars-file=apps/web/.cloudrun.env.yaml \
            --set-secrets=STRIPE_SECRET_KEY=stripe-secret-key:latest,STRIPE_WEBHOOK_SECRET=stripe-webhook-secret:latest,RECORDING_WEBHOOK_SECRET=recording-webhook-secret:latest,LIVEKIT_URL=livekit-url:latest,LIVEKIT_API_KEY=livekit-api-key:latest,LIVEKIT_API_SECRET=livekit-api-secret:latest
