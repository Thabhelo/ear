name = "ear"
main = "src/index.js"
compatibility_date = "2024-06-01"

# Custom domains auto-create proxied DNS + TLS (no manual A/CNAME needed).
[[routes]]
pattern = "callsomeone.org"
custom_domain = true

[[routes]]
pattern = "www.callsomeone.org"
custom_domain = true

[[routes]]
pattern = "api.callsomeone.org"
custom_domain = true

[vars]
WEB_ORIGIN = "callsomeone-web-963565155466.us-central1.run.app"
API_ORIGIN = "callsomeone-api-963565155466.us-central1.run.app"
