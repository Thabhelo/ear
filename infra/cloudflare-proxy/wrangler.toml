name = "ear"
main = "src/index.js"
compatibility_date = "2024-06-01"

# Custom domains auto-create proxied DNS + TLS (no manual A/CNAME needed).
[[routes]]
pattern = "callsomeone.org"
custom_domain = true

[[routes]]
pattern = "www.callsomeone.org"
custom_domain = true

[[routes]]
pattern = "api.callsomeone.org"
custom_domain = true

[vars]
WEB_ORIGIN = "pickup-web-4szghdmntq-uc.a.run.app"
API_ORIGIN = "pickup-api-4szghdmntq-uc.a.run.app"
